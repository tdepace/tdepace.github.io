<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giorno 01 · Domenica 9 Agosto · Edimburgo · Old Town a piedi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=Newsreader:opsz,wght@6..72,300..600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root {
    --paper: #f3ecdc;
    --ink: #1f2a22;
    --ink-soft: #3d4a3f;
    --moss: #2d4a36;
    --moss-deep: #1a3327;
    --rust: #b85c3a;
    --line: rgba(31, 42, 34, 0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background: var(--paper); font-family: 'Newsreader', Georgia, serif; }
  #map { position: absolute; inset: 0; width: 100%; height: 100%; background: var(--paper); }

  .map-title-chip {
    position: absolute; top: 12px; left: 12px; z-index: 1000;
    background: rgba(243, 236, 220, 0.93);
    border: 1px solid var(--line);
    border-radius: 9px;
    padding: 9px 13px;
    max-width: 72%;
    box-shadow: 0 2px 10px rgba(31,42,34,0.14);
    backdrop-filter: blur(2px);
  }
  .map-title-chip .r {
    font-family: 'Fraunces', serif; font-weight: 600;
    color: var(--moss-deep); font-size: 15px; line-height: 1.15;
  }
  .map-title-chip .s {
    font-family: 'Newsreader', serif; color: var(--ink-soft);
    font-size: 12px; margin-top: 2px; line-height: 1.2;
  }
  #note {
    position: absolute; bottom: 12px; left: 12px; z-index: 1000;
    background: rgba(243, 236, 220, 0.93);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 6px 11px;
    max-width: 72%;
    font-family: 'Newsreader', serif; font-style: italic;
    font-size: 12px; color: var(--ink-soft);
    box-shadow: 0 2px 8px rgba(31,42,34,0.12);
    backdrop-filter: blur(2px);
  }
  #note:empty { display: none; }

  .daymap-pin {
    display: flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--moss); color: var(--paper);
    border: 2px solid var(--paper);
    box-shadow: 0 1px 4px rgba(31,42,34,0.4);
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 15px;
  }
  .leaflet-popup-content { font-family: 'Newsreader', serif; font-size: 14px; }
  .daymap-label {
    background: transparent; border: none; box-shadow: none;
    font-family: 'Fraunces', serif; font-weight: 600;
    font-size: 13px; letter-spacing: 0.04em;
    color: var(--moss-deep); text-transform: uppercase; white-space: nowrap;
    text-shadow:
      0 0 3px var(--paper), 0 0 3px var(--paper),
      0 0 5px var(--paper), 1px 1px 0 var(--paper),
      -1px -1px 0 var(--paper), 1px -1px 0 var(--paper),
      -1px 1px 0 var(--paper);
  }
  .daymap-label::before { display: none; }
</style>
</head>
<body>
<div id="map"></div>
<div class="map-title-chip">
  <div class="r">Old Town a piedi</div>
  <div class="s">Giorno 01 · Domenica 9 Agosto · Edimburgo</div>
</div>
<div id="note">Carico il percorso lungo le strade…</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
(function () {
  var PROFILE = "foot";
  var STOPS = [[55.9485947, -3.1999135, "Edinburgh Castle", "Castle"], [55.9494484, -3.1936693, "Gladstone's Land", "Gladstone's"], [55.9494837, -3.1908918, "St Giles' Cathedral", "St Giles'"], [55.9487452, -3.1958982, "Scotch Whisky Experience", "Whisky Exp."], [55.9527138, -3.1722724, "Palace of Holyroodhouse", "Holyrood"]];
  var ROUTE_URLS = ["https://routing.openstreetmap.de/routed-foot/route/v1/foot/", "https://routing.openstreetmap.de/routed-foot/route/v1/driving/", "https://router.project-osrm.org/route/v1/foot/"];

  function themeColors() {
    var s = getComputedStyle(document.documentElement);
    return {
      moss: (s.getPropertyValue('--moss') || '#2d4a36').trim(),
      rust: (s.getPropertyValue('--rust') || '#b85c3a').trim()
    };
  }
  function numberedIcon(n) {
    return L.divIcon({
      className: '',
      html: '<div class="daymap-pin">' + n + '</div>',
      iconSize: [28, 28], iconAnchor: [14, 14], popupAnchor: [0, -16]
    });
  }

  var colors = themeColors();
  var map = L.map('map', { scrollWheelZoom: false, zoomControl: false });
  L.control.zoom({ position: 'topright' }).addTo(map);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png', {
    maxZoom: 20, subdomains: 'abcd', attribution: '&copy; OpenStreetMap, &copy; CARTO'
  }).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png', {
    maxZoom: 20, subdomains: 'abcd', pane: 'markerPane', attribution: ''
  }).addTo(map);

  var latlngs = [];
  STOPS.forEach(function (st, i) {
    var lat = st[0], lon = st[1], label = st[2], shortLabel = st[3];
    latlngs.push([lat, lon]);
    var m = L.marker([lat, lon], { icon: numberedIcon(i + 1) })
      .addTo(map)
      .bindPopup('<strong>' + (i + 1) + '.</strong> ' + label);
    if (shortLabel) {
      m.bindTooltip(shortLabel, {
        permanent: true, direction: 'right', offset: [16, 0], className: 'daymap-label'
      });
    }
  });
  map.fitBounds(latlngs, { padding: [50, 50] });

  var note = document.getElementById('note');
  var fallback = L.polyline(latlngs, {
    color: colors.rust, weight: 2, opacity: 0.5, dashArray: '4 8'
  }).addTo(map);

  var coordStr = STOPS.map(function (s) { return s[1] + ',' + s[0]; }).join(';');

  function drawRoute(d) {
    map.removeLayer(fallback);
    var coords = d.routes[0].geometry.coordinates.map(function (c) { return [c[1], c[0]]; });
    var line = L.polyline(coords, { color: colors.rust, weight: 4, opacity: 0.9 }).addTo(map);
    map.fitBounds(line.getBounds(), { padding: [50, 50] });
    var km = (d.routes[0].distance / 1000);
    var min = Math.round(d.routes[0].duration / 60);
    var hh = Math.floor(min / 60), mm = min % 60;
    var dur = hh > 0 ? (hh + 'h ' + mm + 'min') : (mm + 'min');
    var mode = PROFILE === 'foot' ? 'a piedi' : 'in auto';
    note.textContent = 'Percorso ' + mode + ': circa ' +
      km.toFixed(km < 10 ? 1 : 0) + ' km · ' + dur + ' (soste escluse).';
  }

  function tryRoute(i) {
    if (i >= ROUTE_URLS.length) {
      note.textContent = 'Percorso indicativo (linea retta tra le tappe).';
      return;
    }
    var url = ROUTE_URLS[i] + coordStr + '?overview=full&geometries=geojson';
    fetch(url).then(function (r) { return r.json(); }).then(function (d) {
      if (d && d.code === 'Ok' && d.routes && d.routes[0]) {
        drawRoute(d);
      } else {
        tryRoute(i + 1);
      }
    }).catch(function () { tryRoute(i + 1); });
  }
  tryRoute(0);
})();
</script>
</body>
</html>
