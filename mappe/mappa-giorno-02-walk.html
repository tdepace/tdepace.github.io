<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giorno 2 · Edimburgo New Town</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,600,0&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }
  #map { width: 100%; height: 100%; }
  .pin {
    display: flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 50%;
    background: #2d4a36; color: #f3ecdc;
    border: 2px solid #f3ecdc;
    box-shadow: 0 1px 4px rgba(31,42,34,0.4);
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 15px;
  }
  .label {
    background: transparent; border: none; box-shadow: none;
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 13px;
    letter-spacing: 0.04em; color: #1a3327; text-transform: uppercase;
    white-space: nowrap;
    text-shadow:
      0 0 3px #f3ecdc, 0 0 3px #f3ecdc, 0 0 5px #f3ecdc,
      1px 1px 0 #f3ecdc, -1px -1px 0 #f3ecdc,
      1px -1px 0 #f3ecdc, -1px 1px 0 #f3ecdc;
  }
  .label::before { display: none; }
  .leaflet-popup-content { font-family: Georgia, serif; font-size: 14px; }
</style>
</head>
<body>
<div id="map"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
(function () {
  var stops = [
    { lat: 55.9509847, lon: -3.1985488, name: "Princes Street Gardens", label: "Princes St Gdns" },
    { lat: 55.9554998, lon: -3.1935213, name: "Scottish National Portrait Gallery", label: "Portrait Gallery" },
    { lat: 55.9529022, lon: -3.2141979, name: "Dean Village", label: "Dean Village" },
    { lat: 55.9550465, lon: -3.1827409, name: "Calton Hill", label: "Calton Hill" },
    { lat: 55.9537992, lon: -3.1908747, name: "Tattu Edinburgh (cena 20:00)", label: "Tattu" }
  ];

  var map = L.map('map', { scrollWheelZoom: true });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png', {
    maxZoom: 20, subdomains: 'abcd',
    attribution: '&copy; OpenStreetMap, &copy; CARTO'
  }).addTo(map);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png', {
    maxZoom: 20, subdomains: 'abcd', pane: 'markerPane'
  }).addTo(map);

  var latlngs = [];
  stops.forEach(function (s, i) {
    latlngs.push([s.lat, s.lon]);
    var icon = L.divIcon({
      className: '', iconSize: [28, 28], iconAnchor: [14, 14], popupAnchor: [0, -16],
      html: '<div class="pin">' + (i + 1) + '</div>'
    });
    var m = L.marker([s.lat, s.lon], { icon: icon })
      .addTo(map)
      .bindPopup('<strong>' + (i + 1) + '.</strong> ' + s.name);
    if (s.label) {
      m.bindTooltip(s.label, {
        permanent: true, direction: 'right', offset: [16, 0], className: 'label'
      });
    }
  });

  map.fitBounds(latlngs, { padding: [40, 40] });

  var fallback = L.polyline(latlngs, {
    color: '#b85c3a', weight: 2, opacity: 0.5, dashArray: '4 8'
  }).addTo(map);

  var coordStr = stops.map(function (s) { return s.lon + ',' + s.lat; }).join(';');
  fetch('https://router.project-osrm.org/route/v1/foot/' + coordStr + '?overview=full&geometries=geojson')
    .then(function (r) { return r.json(); })
    .then(function (d) {
      if (d && d.code === 'Ok' && d.routes && d.routes[0]) {
        map.removeLayer(fallback);
        var coords = d.routes[0].geometry.coordinates.map(function (c) { return [c[1], c[0]]; });
        L.polyline(coords, { color: '#b85c3a', weight: 4, opacity: 0.9 }).addTo(map);
      }
    })
    .catch(function () {});
})();
</script>
</body>
</html>
